<!DOCTYPE html>
<html>

<head>

    <title>Crypto Search App</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background-color: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        h1{
            color: cyan;
        }

        input{
            padding: 10px;
            width: 250px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
        }

        button{
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: cyan;
            font-size: 18px;
            cursor: pointer;
        }

        .card{
            background-color: #222;
            width: 300px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px cyan;
        }

        .chart-box{
    width: 600px;
    max-width: 90%;
    height: 300px;
    margin: 30px auto;
    background-color: #222;
    padding: 20px;
    border-radius: 15px;
}
           
        

    </style>

</head>

<body>

    <h1>🔍 Search Cryptocurrency</h1>

    <form method="POST">

        <input type="text" name="coin" placeholder="Enter coin name">

        <button type="submit">Search</button>

    </form>

    <div class="card">

        <h2>{{ coin }}</h2>

        <p>${{ price }}</p>

    </div>

    <div class="chart-box">
        <canvas id="priceChart"></canvas>
    </div>

    <script>

    const ctx = document.getElementById('priceChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['1 PM', '2 PM', '3 PM', '4 PM', '5 PM'],
            datasets: [{
                label: 'Crypto Price',
                data: [20, 25, 22, 30, 35],
                borderColor: 'cyan',
                borderWidth: 3,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    </script>

</body>

</html>
